<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% include favicon.html %}
  {% include google-analytics.html %}
</head>
<body>
  <header>
    <div class="container">
      <nav class="blog-nav">
        <a href="{{ '/' | relative_url }}" class="blog-nav-logo">Pierre Stanislas</a>
        <div class="blog-nav-links">
          <a href="{{ '/' | relative_url }}#apps">Apps</a>
          <a href="{{ '/blog/' | relative_url }}" class="active">Blog</a>
          <a href="mailto:ps.applecontact@gmail.com">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-links">
          <a href="{{ '/' | relative_url }}#privacy">Privacy Policy</a>
          <a href="mailto:ps.applecontact@gmail.com">Contact</a>
          <a href="{{ '/' | relative_url }}#apps">Apps</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
        </div>
        <div class="footer-info">
          <div class="footer-copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</div>
          <div class="footer-tagline">Made with passion</div>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
