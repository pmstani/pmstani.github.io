<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% include favicon.html %}
    {% include google-analytics.html %}
  </head>
  <body>
    <header>
      <div class="container">
        <a href="{{ '/' | relative_url }}" class="back-link">&larr; Home</a>
      </div>
    </header>

    <main>
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links">
            <a href="{{ '/' | relative_url }}#privacy">Privacy Policy</a>
            <a href="mailto:ps.applecontact@gmail.com">Contact</a>
            <a href="{{ '/' | relative_url }}#apps">Apps</a>
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
          </div>
          <div class="footer-info">
            <div class="footer-copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</div>
            <div class="footer-tagline">Made with passion</div>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
