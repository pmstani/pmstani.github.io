# =============================================================================
# Site Settings
# =============================================================================
title: "Pierre Stanislas - iOS & macOS App Developer"
email: ps.applecontact@gmail.com
description: >-
  Independent iOS and macOS app developer since 2007. Browse a collection of 70+
  carefully crafted apps including Safari extensions, productivity tools, health
  and wellness apps, and more on the Apple App Store.
baseurl: ""
url: "https://pmstani.github.io"
logo: "img/SiteIcon.svg"

github: [metadata]

# =============================================================================
# Build Settings
# =============================================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# =============================================================================
# Collections (if needed for app pages in future)
# =============================================================================
# collections:
#   apps:
#     output: true
#     permalink: /apps/:path/

# =============================================================================
# Defaults
# =============================================================================
defaults:
  - scope:
      path: "apps"
      type: "pages"
    values:
      layout: "app-page"

