# =============================================================================
# Site Settings
# =============================================================================
title: "iOS & macOS Apps"
email: ps.applecontact@gmail.com
description: >-
  Independent iOS and macOS app developer since 2007. Browse a collection of 70+
  carefully crafted apps including Safari extensions, productivity tools, health
  and wellness apps, and more on the Apple App Store.
baseurl: ""
url: "https://pmstani.github.io"
logo: "img/SiteIcon.svg"

github: [metadata]

# =============================================================================
# Build Settings
# =============================================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# =============================================================================
# Blog Settings
# =============================================================================
permalink: /blog/:categories/:title/

# =============================================================================
# Defaults
# =============================================================================
defaults:
  - scope:
      path: "apps"
      type: "pages"
    values:
      layout: "app-page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "Tenpercent Apps"

# =============================================================================
# Exclude from processing
# =============================================================================
exclude:
  - .claude-work/
  - CLAUDE.md
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
