{% if include.app_slug %}
  {% for app in site.data.apps %}
    {% if app.slug == include.app_slug %}
<div class="blog-cta">
  <img src="{{ '/img/apps/' | append: app.icon | relative_url }}" alt="{{ app.name }}" width="64" height="64" loading="lazy">
  <div class="blog-cta-content">
    <strong>{{ app.name }}</strong> &mdash; {{ app.tagline }}
    <a href="https://apps.apple.com/app/id{{ app.id }}" class="blog-cta-button" target="_blank" rel="noopener noreferrer">Download</a>
  </div>
</div>
    {% endif %}
  {% endfor %}
{% endif %}
